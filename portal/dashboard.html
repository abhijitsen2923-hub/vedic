<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard — International Vedic Academy</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/portal.css" />
</head>
<body class="app-page">

<header class="app-header">
  <a class="brand-row" href="dashboard.html">
    <div class="brand-mark brand-mark--sm">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="3"/>
        <path d="M12 2v3M12 19v3M4.93 4.93l2.12 2.12M16.95 16.95l2.12 2.12M2 12h3M19 12h3M4.93 19.07l2.12-2.12M16.95 7.05l2.12-2.12"/>
      </svg>
    </div>
    <span class="brand-text brand-text--sm">International<br><span>Vedic Academy</span></span>
  </a>
  <div class="app-header__actions">
    <span id="user-greeting" class="user-greeting"></span>
    <button id="logout-btn" class="ghost-btn" type="button">Sign out</button>
  </div>
</header>

<main class="app-main">
  <section class="welcome-card">
    <h1 id="welcome-title">Welcome back</h1>
    <p>You're signed in. Full dashboard, courses, attendance, and recordings ship in the next phase of work.</p>
    <p class="muted">Your profile:</p>
    <pre id="profile-dump" class="profile-dump">Loading…</pre>
  </section>
</main>

<script type="module" src="js/dashboard.js"></script>
</body>
</html>
