<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Page Not Found — International Vedic Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg-cream:#f7f1e3;--ink:#1a1535;--cosmic-violet:#4a2f8e;--gold:#d4a24c;--gold-bright:#f0c878}
  *{margin:0;padding:0;box-sizing:border-box}
  body{min-height:100vh;display:grid;place-items:center;background:var(--bg-cream);font-family:Inter,system-ui,sans-serif;padding:2rem;text-align:center;color:var(--ink)}
  h1{font-family:Fraunces,serif;font-size:clamp(4rem,15vw,9rem);color:var(--cosmic-violet);margin:0;line-height:1}
  h2{font-family:Fraunces,serif;font-size:1.5rem;font-weight:500;margin:1rem 0 .5rem;color:var(--ink)}
  p{font-size:1.0625rem;max-width:32rem;margin:0 auto 2rem;color:#4a4365}
  a{display:inline-block;background:linear-gradient(135deg,var(--gold-bright),var(--gold));color:#1a0f00;padding:.85rem 2rem;border-radius:999px;text-decoration:none;font-weight:600;box-shadow:0 4px 15px rgba(212,162,76,.3);transition:transform .2s,box-shadow .2s}
  a:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(212,162,76,.5)}
</style>
</head>
<body>
  <main>
    <h1>404</h1>
    <h2>Lost in the stars</h2>
    <p>The page you're looking for doesn't exist. Let's get you back on a familiar path.</p>
    <a href="/">Return Home</a>
  </main>
</body>
</html>
