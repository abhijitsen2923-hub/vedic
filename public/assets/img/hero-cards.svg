<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 600" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Three floating tarot and numerology cards">
  <defs>
    <!-- Cosmic-purple card fill (matches the original .hv-card linear-gradient) -->
    <linearGradient id="cardFill" x1="0%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%"   stop-color="#1f1648"/>
      <stop offset="50%"  stop-color="#14102a"/>
      <stop offset="100%" stop-color="#0a0618"/>
    </linearGradient>
    <!-- Subtle inner top highlight (replaces the radial-gradient overlay on .hv-card) -->
    <radialGradient id="cardHighlight" cx="50%" cy="0%" r="65%">
      <stop offset="0%"  stop-color="#4a2f8e" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#4a2f8e" stop-opacity="0"/>
    </radialGradient>
    <!-- Gold halo glow around the card edges -->
    <filter id="goldHalo" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feFlood flood-color="#d4a24c" flood-opacity="0.45"/>
      <feComposite in2="SourceAlpha" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Inner icon glow (drop-shadow replacement) -->
    <filter id="iconGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Reusable card frame (gradient fill + gold stroke + double inner border) -->
    <symbol id="cardFrame" overflow="visible">
      <rect width="110" height="176" rx="10" fill="url(#cardFill)"
            stroke="#d4a24c" stroke-width="1.5" filter="url(#goldHalo)"/>
      <rect width="110" height="176" rx="10" fill="url(#cardHighlight)"/>
      <rect x="5"  y="5"  width="100" height="166" rx="6"
            fill="none" stroke="#d4a24c" stroke-opacity="0.55" stroke-width="1"/>
      <rect x="9"  y="9"  width="92"  height="158" rx="4"
            fill="none" stroke="#f0c878" stroke-opacity="0.25" stroke-width="0.5"/>
    </symbol>
  </defs>

  <!-- ============ Card 1: TAROT zodiac wheel (top, +8deg) ============ -->
  <g transform="translate(305, 12)">
    <g transform="rotate(8 55 88)">
      <g>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 0 -12; 0 0" dur="6s" begin="0s" repeatCount="indefinite"/>
        <use href="#cardFrame" width="110" height="176"/>
        <!-- Zodiac chart icon (60x60 viewBox of the original, scaled to ~78x78, centred horizontally) -->
        <g transform="translate(16,22) scale(1.3)" fill="none" stroke="#f0c878" stroke-width="0.8" filter="url(#iconGlow)">
          <circle cx="30" cy="30" r="22"/>
          <circle cx="30" cy="30" r="17"/>
          <circle cx="30" cy="30" r="11"/>
          <circle cx="30" cy="30" r="6"/>
          <circle cx="30" cy="30" r="2" fill="#f0c878"/>
          <line x1="30" y1="8"  x2="30" y2="52" stroke-width="0.4" opacity="0.6"/>
          <line x1="8"  y1="30" x2="52" y2="30" stroke-width="0.4" opacity="0.6"/>
          <line x1="14" y1="14" x2="46" y2="46" stroke-width="0.4" opacity="0.6"/>
          <line x1="46" y1="14" x2="14" y2="46" stroke-width="0.4" opacity="0.6"/>
          <line x1="30" y1="11" x2="30" y2="14" stroke-width="0.7"/>
          <line x1="30" y1="46" x2="30" y2="49" stroke-width="0.7"/>
          <line x1="11" y1="30" x2="14" y2="30" stroke-width="0.7"/>
          <line x1="46" y1="30" x2="49" y2="30" stroke-width="0.7"/>
          <line x1="40" y1="13" x2="38" y2="17" stroke-width="0.5"/>
          <line x1="20" y1="13" x2="22" y2="17" stroke-width="0.5"/>
          <line x1="40" y1="47" x2="38" y2="43" stroke-width="0.5"/>
          <line x1="20" y1="47" x2="22" y2="43" stroke-width="0.5"/>
          <line x1="13" y1="40" x2="17" y2="38" stroke-width="0.5"/>
          <line x1="47" y1="40" x2="43" y2="38" stroke-width="0.5"/>
          <line x1="13" y1="20" x2="17" y2="22" stroke-width="0.5"/>
          <line x1="47" y1="20" x2="43" y2="22" stroke-width="0.5"/>
          <circle cx="30" cy="30" r="9" stroke-dasharray="0.8 1.2" opacity="0.7"/>
        </g>
        <!-- Decorative line above label -->
        <line x1="38" y1="148" x2="72" y2="148"
              stroke="#f0c878" stroke-opacity="0.7" stroke-width="0.5"/>
        <!-- Label -->
        <text x="55" y="160" text-anchor="middle"
              font-family="Georgia, 'Times New Roman', serif"
              font-size="9" font-weight="600" letter-spacing="2.5"
              fill="#f0c878">TAROT</text>
      </g>
    </g>
  </g>

  <!-- ============ Card 2: NUMEROLOGY numbers (middle, -6deg, 118x189) ============ -->
  <g transform="translate(285, 200)">
    <g transform="rotate(-6 59 94.5)">
      <g>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 0 -14; 0 0" dur="6s" begin="-2s" repeatCount="indefinite"/>
        <!-- Card frame (118x189) — same structure as #cardFrame but resized -->
        <rect width="118" height="189" rx="10" fill="url(#cardFill)"
              stroke="#d4a24c" stroke-width="1.5" filter="url(#goldHalo)"/>
        <rect width="118" height="189" rx="10" fill="url(#cardHighlight)"/>
        <rect x="5"  y="5"  width="108" height="179" rx="6"
              fill="none" stroke="#d4a24c" stroke-opacity="0.55" stroke-width="1"/>
        <rect x="9"  y="9"  width="100" height="171" rx="4"
              fill="none" stroke="#f0c878" stroke-opacity="0.25" stroke-width="0.5"/>
        <!-- Numerology numbers grid (60x70 viewBox scaled 1.3x) -->
        <g transform="translate(20,24) scale(1.3)" filter="url(#iconGlow)">
          <text x="11" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="600" font-style="italic" fill="#f0c878">3</text>
          <text x="35" y="22" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="600" font-style="italic" fill="#f0c878">7</text>
          <text x="6"  y="44" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="600" font-style="italic" fill="#f0c878">3</text>
          <text x="22" y="44" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="600" font-style="italic" fill="#f0c878">7</text>
          <text x="38" y="44" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="600" font-style="italic" fill="#f0c878">2</text>
          <text x="14" y="64" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="600" font-style="italic" fill="#f0c878">2</text>
          <text x="33" y="64" font-family="Georgia, 'Times New Roman', serif" font-size="18" font-weight="600" font-style="italic" fill="#f0c878">9</text>
          <line x1="4" y1="28" x2="56" y2="28" stroke="#f0c878" stroke-width="0.3" opacity="0.4" stroke-dasharray="1 2"/>
          <line x1="4" y1="50" x2="56" y2="50" stroke="#f0c878" stroke-width="0.3" opacity="0.4" stroke-dasharray="1 2"/>
        </g>
        <!-- Decorative line above label -->
        <line x1="38" y1="160" x2="80" y2="160"
              stroke="#f0c878" stroke-opacity="0.7" stroke-width="0.5"/>
        <text x="59" y="172" text-anchor="middle"
              font-family="Georgia, 'Times New Roman', serif"
              font-size="9" font-weight="600" letter-spacing="2.5"
              fill="#f0c878">NUMEROLOGY</text>
      </g>
    </g>
  </g>

  <!-- ============ Card 3: ASTRO pyramid (bottom, +12deg, 100x160) ============ -->
  <g transform="translate(265, 400)">
    <g transform="rotate(12 50 80)">
      <g>
        <animateTransform attributeName="transform" type="translate"
          values="0 0; 0 -12; 0 0" dur="6s" begin="-4s" repeatCount="indefinite"/>
        <!-- Card frame (100x160) — same structure, resized -->
        <rect width="100" height="160" rx="10" fill="url(#cardFill)"
              stroke="#d4a24c" stroke-width="1.5" filter="url(#goldHalo)"/>
        <rect width="100" height="160" rx="10" fill="url(#cardHighlight)"/>
        <rect x="5"  y="5"  width="90"  height="150" rx="6"
              fill="none" stroke="#d4a24c" stroke-opacity="0.55" stroke-width="1"/>
        <rect x="9"  y="9"  width="82"  height="142" rx="4"
              fill="none" stroke="#f0c878" stroke-opacity="0.25" stroke-width="0.5"/>
        <!-- Pyramid + circle icon (60x80 viewBox scaled 1.15x) -->
        <g transform="translate(15,15) scale(1.15)" fill="none" stroke="#f0c878" stroke-width="0.8" filter="url(#iconGlow)">
          <circle cx="30" cy="20" r="11"/>
          <circle cx="30" cy="20" r="6" stroke-dasharray="0.5 1" opacity="0.6"/>
          <circle cx="30" cy="20" r="1.5" fill="#f0c878"/>
          <line x1="30" y1="10" x2="30" y2="14" stroke-width="0.5"/>
          <line x1="30" y1="26" x2="30" y2="30" stroke-width="0.5"/>
          <line x1="20" y1="20" x2="24" y2="20" stroke-width="0.5"/>
          <line x1="36" y1="20" x2="40" y2="20" stroke-width="0.5"/>
          <path d="M30 32 L52 70 L8 70 Z"/>
          <path d="M30 42 L46 68 L14 68 Z" opacity="0.5"/>
          <path d="M30 50 L40 66 L20 66 Z" opacity="0.4"/>
          <line x1="30" y1="32" x2="30" y2="68" stroke-width="0.4" opacity="0.5" stroke-dasharray="1 1"/>
        </g>
        <line x1="32" y1="134" x2="68" y2="134"
              stroke="#f0c878" stroke-opacity="0.7" stroke-width="0.5"/>
        <text x="50" y="146" text-anchor="middle"
              font-family="Georgia, 'Times New Roman', serif"
              font-size="9" font-weight="600" letter-spacing="2.5"
              fill="#f0c878">NUMEROLOGY</text>
      </g>
    </g>
  </g>
</svg>
