<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/png" href="/favicon.png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<title>Dashboard — International Vedic Academy</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/portal.css" />
</head>
<body class="app-page">

<header class="app-header" id="app-header"></header>

<main class="app-main">
  <h1 class="page-title" id="welcome">Welcome back</h1>
  <div class="alert alert--error" id="dash-error" hidden>Could not load your dashboard. Please refresh.</div>

  <div class="summary-row">
    <section class="stat-card" id="next-class-card">
      <span class="stat-card__label">Next class</span>
      <div id="next-class"><span class="muted">Loading…</span></div>
    </section>
    <section class="stat-card" id="attendance-card">
      <span class="stat-card__label">Attendance</span>
      <div id="attendance-summary"><span class="muted">Loading…</span></div>
    </section>
  </div>

  <h2 class="section-title">My courses</h2>
  <div class="card-grid" id="courses"><span class="muted">Loading…</span></div>
</main>

<script type="module" src="js/dashboard.js"></script>
</body>
</html>
