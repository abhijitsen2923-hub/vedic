<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/png" href="/favicon.png" />
<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
<title>Sign In — International Vedic Academy</title>
<meta name="robots" content="noindex, nofollow" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/portal.css" />
</head>
<body class="auth-page">

<aside class="cosmic-side">
  <div class="brand">
    <img src="/assets/img/logo.png" class="brand-logo" alt="International Vedic Academy" />
  </div>

  <div class="cosmic-hero">
    <h1>Step into the <em>cosmos</em> of timeless wisdom.</h1>
    <p>Live classes in Vedic astrology, numerology and tarot — guided by traditional acharyas, delivered to your screen.</p>
  </div>

  <div class="cosmic-footer"><a href="/">← Back to website</a></div>
</aside>

<main class="form-side">
  <div class="form-wrap">
    <h2 id="auth-title">Welcome back</h2>
    <p id="auth-subtitle">Sign in to continue your cosmic journey.</p>

    <div class="auth-error" id="auth-error" role="alert" aria-live="polite"></div>

    <form id="auth-form" novalidate>
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required minlength="6" />
      </div>

      <button type="submit" class="submit-btn" id="auth-submit">Sign in</button>
    </form>
  </div>
</main>

<script type="module" src="js/auth.js"></script>
</body>
</html>
